<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2a0e0a">
<meta name="description" content="朕的江山 · 皇帝成长录 —— 一款多系统深度养成的中式皇帝模拟经营网页游戏：培养帝王属性、任命满朝文武、经营后宫子嗣、统兵征战、理财科举外交，江山世代传承。">
<title>朕的江山 · 皇帝成长录</title>
<link rel="stylesheet" href="css/style.css?v=0621z">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%91%91%3C/text%3E%3C/svg%3E">
</head>
<body>
<div id="app">

  <!-- ===== 开场预加载（恭迎圣驾·预备全部立绘）===== -->
  <div id="preloader">
    <div class="pl-inner">
      <div class="pl-seal">朕</div>
      <h1 class="pl-title">朕 的 江 山</h1>
      <p class="pl-sub">— 恭 迎 圣 驾 —</p>
      <div class="pl-bar"><i id="pl-fill"></i></div>
      <p class="pl-text" id="pl-text">正在备办仪仗…</p>
    </div>
  </div>

  <!-- ===== 标题 ===== -->
  <section id="screen-title" class="screen active">
    <div class="title-bg"></div>
    <div class="title-inner">
      <div class="title-seal">朕</div>
      <h1 class="game-title">朕的江山</h1>
      <p class="game-sub">— 皇 帝 成 长 录 · Emperor's Chronicle —</p>
      <div class="setup">
        <label class="field"><span>国号</span><input id="inp-dynasty" maxlength="4" placeholder="大宁"></label>
        <label class="field"><span>名讳</span><input id="inp-name" maxlength="6" placeholder="萧承乾"></label>
        <label class="field"><span>年号</span><input id="inp-reign" maxlength="4" placeholder="永熙"></label>
      </div>
      <button id="btn-start" class="btn btn-primary">即 皇 帝 位</button>
      <div class="title-links">
        <button id="btn-continue" class="btn-link">继续上局</button>
        <button id="btn-load" class="btn-link">读取存档</button>
        <button id="btn-help" class="btn-link">玩法说明</button>
      </div>
      <p class="title-record" id="title-record"></p>
      <p class="title-credit">全套立绘由 ComfyUI（底模 animagineXL3.1）生成 · 中国风赛璐璐古风</p>
      <p class="build-stamp">build 0621z</p>
    </div>
  </section>

  <!-- ===== 游戏主界面 ===== -->
  <section id="screen-game" class="screen">
    <header class="hud">
      <div class="hud-reign">
        <span id="hud-title" class="hud-title">大宁 · 永熙</span>
        <span id="hud-date" class="hud-date">元年 正月</span>
      </div>
      <div class="hud-nation" id="hud-nation"></div>
      <button id="btn-menu" class="icon-btn" title="菜单">≡</button>
    </header>

    <div class="layout">
      <!-- 皇帝面板 -->
      <aside class="emperor-panel">
        <div class="emp-portrait" id="emp-portrait"></div>
        <div class="emp-name" id="emp-name">萧承乾</div>
        <div class="emp-age" id="emp-age">圣寿 18 · 第 1 代</div>
        <div class="emp-attrs" id="emp-attrs"></div>
      </aside>

      <!-- 中央：事件 / 月报 + 行动 -->
      <section class="center">
        <div class="event-area" id="event-area"></div>
        <div class="action-area" id="action-area"></div>
      </section>
    </div>

    <!-- 底部导航 -->
    <nav class="tabbar">
      <button class="tab" data-panel="map"><i class="tico"></i><span>天下</span></button>
      <button class="tab" data-panel="court"><i class="tico"></i><span>朝堂</span></button>
      <button class="tab" data-panel="harem"><i class="tico"></i><span>后宫</span></button>
      <button class="tab" data-panel="heir"><i class="tico"></i><span>皇嗣</span></button>
      <button class="tab" data-panel="army"><i class="tico"></i><span>军务</span></button>
      <button class="tab" data-panel="quest"><i class="tico"></i><span>大业</span></button>
      <button class="tab" data-panel="log"><i class="tico"></i><span>史册</span></button>
      <button class="tab tab-next" id="btn-next"><i class="tico"></i><span>下一时段</span></button>
    </nav>
  </section>

  <!-- ===== 结局 ===== -->
  <section id="screen-end" class="screen">
    <div class="end-inner">
      <div class="end-seal" id="end-seal">崩</div>
      <h2 class="end-temple" id="end-temple"></h2>
      <h1 class="end-title" id="end-title"></h1>
      <p class="end-desc" id="end-desc"></p>
      <div class="end-stats" id="end-stats"></div>
      <div class="end-actions">
        <button id="btn-replay" class="btn btn-primary">再开新朝</button>
      </div>
    </div>
  </section>

  <!-- ===== 滑出面板（朝堂/后宫/皇嗣/军务/史册） ===== -->
  <div id="panel-mask" class="panel-mask">
    <div class="panel" id="panel">
      <div class="panel-head">
        <h2 id="panel-title">朝堂</h2>
        <button id="panel-close" class="icon-btn">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>

  <!-- ===== 通用弹窗 ===== -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="modal-close" class="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ===== 浮动飘字 ===== -->
  <div id="toast" class="toast"></div>

</div>

<script src="js/audio.js?v=0621z"></script>
<script src="js/music.js?v=0621z"></script>
<script src="js/data.js?v=0621z"></script>
<script src="js/cast.js?v=0621z"></script>
<script src="js/spy.js?v=0621z"></script>
<script src="js/game.js?v=0621z"></script>
<script src="js/map.js?v=0621z"></script>
<script src="js/battle.js?v=0621z"></script>
<script src="js/warfield.js?v=0621z"></script>
<script src="js/quests.js?v=0621z"></script>
<script src="js/vn.js?v=0621z"></script>
<script src="js/ui.js?v=0621z"></script>
</body>
</html>
